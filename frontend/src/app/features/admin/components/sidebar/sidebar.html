<aside class="vs-admin__side">
  <div class="vs-admin__brand">
    VER<span class="vs-admin__brand__slash">/</span>SUS
  </div>

  @for (section of sections; track section.label) {
    <div class="vs-admin__nav-section">{{ section.label }}</div>
    @for (item of section.items; track item.key) {
      <a class="vs-admin__nav-item"
         [routerLink]="item.route"
         routerLinkActive="active">
        {{ item.label }}
      </a>
    }
  }

  <div class="vs-admin__spacer"></div>

  <div class="vs-admin__profile">
    <vs-avatar
      [name]="auth.user()?.username ?? 'AD'"
      [avatarUrl]="auth.user()?.avatarUrl"
      [sizePx]="28"
      [fontSizePx]="11"
    />
    <div class="vs-admin__profile-info">
      <div class="vs-admin__profile-name">{{ auth.user()?.username ?? '—' }}</div>
      <div class="vs-admin__profile-role">{{ roleLabel(auth.user()?.role) }}</div>
    </div>
  </div>
</aside>
